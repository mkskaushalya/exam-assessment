name = "api-gateway"
main = "src/index.ts"
compatibility_date = "2025-03-15"

[vars]
ENVIRONMENT = "development"
AUTH_SVC_URL = "http://localhost:8788"
PAPERS_SVC_URL = "http://localhost:8789"

[[kv_namespaces]]
binding = "KV"
id = "2c764f04a4164aeb9f5026ffebd06fbc"

# Service bindings for production (Cloudflare deploy)
# [[services]]
# binding = "AUTH_SVC"
# service = "auth-svc"
# [[services]]
# binding = "PAPERS_SVC"
# service = "papers-svc"

[env.production]
name = "api-gateway-production"
routes = [
  { pattern = "exam-api.tute.lk/*", custom_domain = true }
]

[env.production.vars]
ENVIRONMENT = "production"
AUTH_SVC_URL = "https://exam-auth-svc.tute.lk"
PAPERS_SVC_URL = "https://exam-paper-svc.tute.lk"

[[env.production.kv_namespaces]]
binding = "KV"
id = "2c764f04a4164aeb9f5026ffebd06fbc"
